<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>claudeaiblog.com | Join Waitlist</title>
    <script src="/config.js?v=22"></script>
    <link rel="stylesheet" href="/styles.css?v=22" />
  </head>
  <body>
    <main class="shell">
      <section class="segment glass">
        <p class="eyebrow">claudeaiblog.com</p>
        <h1>Join the waitlist</h1>
        <p class="lede">
          Enter your full contact details and preferred callback window. Include
          your California or Georgia state in the address so we can route your request.
        </p>
        <p class="fineprint">Example: `123 Main St, Atlanta, GA 30303` or `456 Pine Ave, Los Angeles, CA 90012`.</p>
      </section>

      <section class="form-wrap">
        <form class="lead-form">
          <label>
            Full name
            <input name="name" type="text" autocomplete="name" required />
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Mobile phone
            <input name="phone" type="tel" autocomplete="tel" required />
          </label>
          <label>
            Address
            <input name="address" type="text" autocomplete="street-address" required />
          </label>
          <div class="time-grid">
            <label>
              Best time to be reached from
              <input name="bestTimeStart" type="time" step="900" required />
            </label>
            <label>
              Best time to be reached until
              <input name="bestTimeEnd" type="time" step="900" required />
            </label>
          </div>
          <button class="button" type="submit">Join waitlist</button>
          <p class="form-status" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="/app.js?v=22"></script>
  </body>
</html>
