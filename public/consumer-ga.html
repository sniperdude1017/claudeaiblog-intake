<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>claudeaiblog.com | Claude AI Georgia</title>
    <script src="/config.js?v=18"></script>
    <link rel="stylesheet" href="/styles.css?v=18" />
  </head>
  <body>
    <main class="shell">
      <section class="segment segment-truist glass">
        <p class="eyebrow">claudeaiblog.com | Georgia</p>
        <h1>Claude AI waitlist — Georgia</h1>
        <p class="lede">
          Join the Claude AI blog waitlist for Georgia readers. Share your
          contact details and the best time to reach you.
        </p>
        <p class="fineprint">General informational use.</p>
      </section>
      <section class="form-wrap">
        <form class="lead-form" data-segment="consumer-ga">
          <label>
            Full name
            <input name="name" type="text" autocomplete="name" required />
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Mobile phone
            <input name="phone" type="tel" autocomplete="tel" required />
          </label>
          <label>
            Address
            <input name="address" type="text" autocomplete="street-address" required />
          </label>
          <div class="time-grid">
            <label>
              Best time to be reached from
              <input name="bestTimeStart" type="time" step="900" required />
            </label>
            <label>
              Best time to be reached until
              <input name="bestTimeEnd" type="time" step="900" required />
            </label>
          </div>
          <button class="button" type="submit">Join waitlist</button>
          <p class="form-status" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="/app.js?v=18"></script>
  </body>
</html>
