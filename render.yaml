services:
  - type: web
    name: inbound-lead-intake
    env: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "npm start"
    autoDeploy: false
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: BASIC_AUTH_USERNAME
        sync: false
      - key: BASIC_AUTH_PASSWORD
        sync: false
      - key: ALLOW_LEAD_READS
        value: "false"
      - key: LEAD_WEBHOOK_URL
        sync: false
      - key: LEAD_WEBHOOK_TOKEN
        sync: false
      - key: LEAD_WEBHOOK_TIMEOUT_MS
        value: "4000"
      - key: GTM_CONTAINER_ID
        sync: false
      - key: GA_MEASUREMENT_ID
        sync: false
      - key: META_PIXEL_ID
        sync: false
    disk:
      name: inbound-data
      mountPath: /var/data
      sizeGB: 1
